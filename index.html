<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>LAChirana Plat: Team LP</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Librería QRCode.js desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Librería para leer Excel (SheetJS) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Librería para generar PDF (jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <main class="container">
    <h1>Generador De Carnets para Alumnos del</h1>

    <!-- Logo oculto para usarlo en el PDF -->
    <img id="logo-img" src="logo.png" alt="Logo" style="margin:auto; display: block;" />

    <section class="card">
      <div class="form-row">
        <label for="codigo">Código (8 dígitos):</label>
        <input id="codigo" type="text" maxlength="8" placeholder="Ingresa 8 dígitos" />
        <button onclick="generarQR()">Generar QR</button>
      </div>

      <p id="mensaje" class="mensaje"></p>

      <div class="qr-wrapper">
        <div id="qrcode"></div>
      </div>
    </section>

    <section class="card card--list">
      <div class="form-row" style="margin-bottom: 12px;">
        <label for="excel">Listado de Alumnos [xlsx,xls]</label>
        <input id="excel" type="file" accept=".xlsx,.xls" />
        <button onclick="procesarExcel()">Generar QRs desde Excel</button>
      </div>

      <p id="mensaje-excel" class="mensaje"></p>

      <div class="list-header" id="resumen-lista"></div>

      <div id="lista-personas"></div>
    </section>
  </main>

  <script>
    let qr; // instancia de QRCode
    let logoDataUrl = null; // logo precargado como dataURL para el PDF

    // Precargar logo.png en un canvas para obtener un dataURL seguro
    window.addEventListener('load', () => {
      
      const img = document.getElementById("logo-img");

      try {

        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(img, 0, 0);

        logoDataUrl = canvas.toDataURL("image/png");

        console.log(logoDataUrl);

      } catch (e) {
        console.log(e);
        logoDataUrl = null;
      }
      
    });

    function generarQR() {
      const input = document.getElementById('codigo');
      const mensaje = document.getElementById('mensaje');
      const valor = input.value.trim();

      // Permitir cualquier string (incluyendo espacios), solo validamos que no esté vacío
      if (!valor) {
        mensaje.textContent = 'El texto para el QR no puede estar vacío.';
        mensaje.classList.add('error');
        document.getElementById('qrcode').innerHTML = '';
        qr = null;
        return;
      }

      mensaje.textContent = '';
      mensaje.classList.remove('error');

      // Si ya existe un QR previo, limpiar el contenedor
      const contenedor = document.getElementById('qrcode');
      contenedor.innerHTML = '';

      // Crear nuevo QR
      qr = new QRCode(contenedor, {
        text: valor,
        width: 256,
        height: 256
      });
    }

  /***/
  
function procesarExcel() {
  const inputFile     = document.getElementById('excel');
  const mensajeExcel  = document.getElementById('mensaje-excel');
  const lista         = document.getElementById('lista-personas');
  const resumen       = document.getElementById('resumen-lista');
 
  mensajeExcel.textContent = '';
  lista.innerHTML = '';
  resumen.textContent = '';
 
  if (!inputFile.files || inputFile.files.length === 0) {
    mensajeExcel.textContent = 'Selecciona un archivo Excel primero.';
    mensajeExcel.classList.add('error');
    return;
  }
 
  const file   = inputFile.files[0];
  const reader = new FileReader();
 
  reader.onload = function (e) {
    try {
      const data          = new Uint8Array(e.target.result);
      const workbook      = XLSX.read(data, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const sheet         = workbook.Sheets[firstSheetName];
      const rows          = XLSX.utils.sheet_to_json(sheet, { defval: '' });
 
      if (!rows.length) {
        mensajeExcel.textContent = 'El Excel está vacío.';
        mensajeExcel.classList.add('error');
        return;
      }
 
      // ── Dimensiones de la página A4 (mm) ──────────────────
      const pageW = 210;
      const pageH = 297;
 
      // ── Márgenes de página (mm) ───────────────────────────
      const marginLeft   = 5;
      const marginTop    = 5;
      const marginRight  = 5;
      const marginBottom = 5;
 
      // ── Tamaño de cada carnet (mm) ────────────────────────
      const cardWidth  = 95;
      const cardHeight = 60;
 
      // ── Separación entre carnets (mm) ─────────────────────
      const gapX = 3;
      const gapY = 3;
 
      // ── Cuántos carnets caben por fila y columna ──────────
      const usableW = pageW - marginLeft - marginRight;
      const usableH = pageH - marginTop  - marginBottom;
 
      const cols = Math.floor((usableW + gapX) / (cardWidth  + gapX));  // ej. 2
      const rows_per_page = Math.floor((usableH + gapY) / (cardHeight + gapY));  // ej. 4
 
      // ── Inicializar jsPDF ─────────────────────────────────
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
 
      let countValidos = 0;
      let cardIndex    = 0;   // contador global de carnets colocados
 
      rows.forEach((row) => {
        const codigo   = String(row.codigo   || row.CODIGO   || '').trim();
        const nombres  = String(row.nombres  || row.NOMBRES  || '').trim();
        const apellidos = String(row.apellidos || row.APELLIDOS || '').trim();
        const aula     = String(row.aula     || row.AULA     || '').trim();
 
        if (!codigo) return; // saltar filas sin código
 
        // ── Generar imagen QR ────────────────────────────────
        const tmp = document.createElement('div');
        new QRCode(tmp, {
          text: codigo,
          width: 80,
          height: 80,
          colorDark:  '#5e3530',
          colorLight: '#ffffff'
        });
 
        const canvas = tmp.querySelector('canvas') || tmp.querySelector('img');
        if (!canvas) return;
 
        const qrDataUrl =
          canvas.tagName.toLowerCase() === 'canvas'
            ? canvas.toDataURL('image/png')
            : canvas.src;
 
        // ── Calcular posición en la página ───────────────────
        const totalPerPage = cols * rows_per_page;
        const posInPage    = cardIndex % totalPerPage;
 
        // Si es el primer carnet de una nueva página (y no la primera)
        if (posInPage === 0 && cardIndex > 0) {
          doc.addPage();
        }
 
        const col = posInPage % cols;
        const rowInPage = Math.floor(posInPage / cols);
 
        const cardX = marginLeft + col * (cardWidth  + gapX);
        const cardY = marginTop  + rowInPage * (cardHeight + gapY);
 
        // ── Dibujar carnet ────────────────────────────────────
        const marginInner = 3;
 
        // Borde redondeado
        doc.setDrawColor(121, 85, 72);
        doc.setLineWidth(0.5);
        doc.roundedRect(cardX, cardY, cardWidth, cardHeight, 3, 3);
 
        // Encabezado "ESTUDIANTE:"
        let textY = cardY + 15;
        try { doc.setFont(undefined, 'bold'); } catch (e) { /* ignore */ }
        doc.setFontSize(20);
        doc.setTextColor(121, 85, 72);
        doc.text('ESTUDIANTE:', cardX + marginInner, textY);
 
        // Apellidos
        doc.setTextColor(211, 135, 48);
        doc.setFontSize(13);
        textY += 9;
        doc.text(apellidos || '-', cardX + marginInner, textY);
 
        // Nombres
        doc.setFontSize(11);
        textY += 6;
        doc.text(nombres || '-', cardX + marginInner, textY);
 
        // Aula
        textY += 6;
        doc.text('Grado - Sección: ' + (aula || '-'), cardX + marginInner, textY);
 
        // Firma de desarrollador (relativa a la esquina inferior del carnet)
        doc.setFontSize(5);
        doc.setFont('helvetica', 'bolditalic');
        doc.setTextColor(121, 85, 72);
        doc.text('By Huarseral Dev', cardX + cardWidth - 16, cardY + cardHeight - 4);
        doc.text('LAChirana Plat',   cardX + cardWidth - 14, cardY + cardHeight - 2);
 
        // QR dentro del carnet
        const qrSizeMm = 20;
        const qrX = cardX + cardWidth  - marginInner - qrSizeMm;
        const qrY = cardY + (cardHeight - qrSizeMm) / 2;
 
        doc.setDrawColor(121, 85, 72);
        doc.setLineWidth(0.4);
        doc.roundedRect(qrX - 2, qrY - 2, qrSizeMm + 4, qrSizeMm + 4, 2, 2);
        doc.addImage(qrDataUrl, 'PNG', qrX, qrY, qrSizeMm, qrSizeMm);
 
        // Logo (si está disponible)
        if (logoDataUrl) {
          try {
            const logoWidth  = 25;
            const logoHeight = 22;
            const logoX = cardX + marginInner - 2;
            const logoY = cardY + cardHeight - logoHeight - 4;
            doc.addImage(logoDataUrl, 'PNG', logoX, logoY, logoWidth, logoHeight);
          } catch (err) { /* continuar sin logo */ }
        }
 
        cardIndex++;
        countValidos++;
      });
 
      // ── Resultado final ───────────────────────────────────
      if (countValidos === 0) {
        mensajeExcel.textContent = 'No se encontraron filas con código en el Excel.';
        mensajeExcel.classList.add('error');
        return;
      }
 
      mensajeExcel.classList.remove('error');
      resumen.textContent = `Se generaron ${countValidos} carnet(s) en ${doc.getNumberOfPages()} página(s).`;
 
      // ── Crear enlace de descarga único ────────────────────
      const blob = doc.output('blob');
      const url  = URL.createObjectURL(blob);
 
      const link = document.createElement('a');
      link.href      = url;
      link.download  = 'carnets_todos.pdf';
      link.textContent = `Descargar todos los carnets (${countValidos}) — PDF`;
      link.className = 'pdf-link';
 
      const wrapper = document.createElement('div');
      wrapper.className = 'pdf-link-item';
      wrapper.appendChild(link);
      lista.appendChild(wrapper);
 
    } catch (err) {
      console.error(err);
      mensajeExcel.textContent = 'Error al leer el archivo Excel. Verifica el formato.';
      mensajeExcel.classList.add('error');
    }
  };
 
  reader.readAsArrayBuffer(file);
}
  /***/
  </script>
</body>
</html>
